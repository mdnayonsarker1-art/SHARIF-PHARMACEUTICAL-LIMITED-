<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharif Pharma - Summary Report</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: linear-gradient(135deg, #e0f2fe 0%, #f1f5f9 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        /* কার্ড স্টাইল (স্ক্রিনশট ১৬ ও ১৭ অনুযায়ী) */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* ইনপুট বক্স ডিজাইন (স্ক্রিনশট ১৭ অনুযায়ী) */
        .custom-input {
            background: #ffffff;
            border: 2px solid #edf2f7;
            border-radius: 20px;
            padding: 14px 20px;
            font-weight: 700;
            color: #1e293b;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .custom-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        /* টেবিল স্টাইল (স্ক্রিনশট ১৮ অনুযায়ী) */
        .report-table { 
            border-collapse: collapse; 
            width: 100%; 
            background: white; 
            border: 2px solid #000 !important; 
        }
        .report-table th, .report-table td { 
            border: 1px solid #000 !important; 
            padding: 12px 8px; 
            font-size: 12px; 
            color: #000; 
            text-transform: uppercase; 
            font-weight: 800;
        }
        .report-table th { 
            background: #f8fafc !important; 
        }
        
        .group-header-row td { 
            background: #0f172a !important; 
            color: white !important; 
            text-align: center; 
            letter-spacing: 1px;
        }
        
        .subtotal-row td { 
            background: #f1f5f9 !important; 
            font-weight: 900;
        }

        /* সেভ পিডিএফ বাটন (স্ক্রিনশট ১৫ অনুযায়ী লাল বাটন) */
        .btn-red {
            background: #ef4444;
            color: white;
            border-radius: 15px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 10px 20px;
            transition: all 0.3s;
        }
        .btn-red:hover { background: #dc2626; transform: translateY(-2px); }

        /* জেনারেট বাটন (স্ক্রিনশট ১৬ অনুযায়ী নীল বাটন) */
        .btn-blue {
            background: #2563eb;
            color: white;
            border-radius: 25px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 16px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-3 md:p-10">

    <div id="pdf-area" class="glass-card max-w-6xl mx-auto p-6 md:p-12">
        
        <div class="flex justify-between items-center mb-10 no-print">
            <a href="index.html" class="bg-white px-6 py-2 rounded-2xl text-[11px] font-black uppercase text-slate-500 shadow-sm border border-slate-100 hover:bg-slate-50 transition-all">
                ← Home
            </a>
            <button id="download-pdf" class="btn-red text-[11px] shadow-lg">
                <i class="fa-solid fa-file-pdf mr-2"></i> Save PDF
            </button>
        </div>

        <div class="text-center mb-10">
            <h1 id="rpt-biz-name" class="text-4xl font-black text-slate-900 tracking-tighter uppercase italic border-b-4 border-blue-600 inline-block pb-1">
                SHARIF PHARMA
            </h1>
            <p class="text-[11px] font-black text-blue-500 uppercase tracking-[4px] mt-3">Collection Summary Report</p>
            <p id="date-range-display" class="mt-4 text-[10px] font-bold bg-blue-50 text-blue-700 px-5 py-2 rounded-full inline-block border border-blue-100 uppercase"></p>
        </div>

        <div class="bg-slate-50/50 p-8 rounded-[40px] mb-12 no-print border border-white shadow-inner">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="flex flex-col">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-3 mb-2 tracking-widest">From Date</label>
                    <input type="date" id="start-date" class="custom-input">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-3 mb-2 tracking-widest">To Date</label>
                    <input type="date" id="end-date" class="custom-input">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-3 mb-2 tracking-widest">Group Filter</label>
                    <select id="group-filter" class="custom-input appearance-none">
                        <option value="All">All Groups</option>
                    </select>
                </div>
            </div>
            <button onclick="window.generateSummaryReport()" class="btn-blue w-full text-sm tracking-widest">
                Search & Generate Report
            </button>
        </div>

        <div id="report-content" class="overflow-x-auto">
            <table class="report-table">
                <thead>
                    <tr>
                        <th style="width: 6%;">SL</th>
                        <th style="width: 35%; text-align: left;">Customer Name</th>
                        <th style="width: 18%;">Invoice (৳)</th>
                        <th style="width: 18%;">Collection (৳)</th>
                        <th style="width: 18%;">Due (৳)</th>
                        <th style="width: 5%;" class="no-print">Del</th>
                    </tr>
                </thead>
                <tbody id="report-body">
                    <tr><td colspan="6" class="text-center p-12 italic text-slate-400 font-bold">Search to display data...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="grand-total-box" class="hidden mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-900 p-8 rounded-[35px] text-white shadow-2xl transform transition hover:scale-105">
                <span class="text-[10px] font-black opacity-50 uppercase tracking-widest">Grand Invoice</span>
                <h2 id="grand-inv" class="text-3xl font-black italic mt-1">৳ 0</h2>
            </div>
            <div class="bg-blue-600 p-8 rounded-[35px] text-white shadow-2xl transform transition hover:scale-105">
                <span class="text-[10px] font-black opacity-50 uppercase tracking-widest">Grand Collection</span>
                <h2 id="grand-coll" class="text-3xl font-black italic mt-1">৳ 0</h2>
            </div>
            <div class="bg-red-500 p-8 rounded-[35px] text-white shadow-2xl transform transition hover:scale-105">
                <span class="text-[10px] font-black opacity-50 uppercase tracking-widest">Total Net Due</span>
                <h2 id="grand-gap" class="text-3xl font-black italic mt-1">৳ 0</h2>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQyZ3CcmzNxVbq2xwj-P89xohIVODrh1Y",
            authDomain: "nayon366-f79c6.firebaseapp.com",
            projectId: "nayon366-f79c6",
            storageBucket: "nayon366-f79c6.firebasestorage.app",
            messagingSenderId: "462628331277",
            appId: "1:462628331277:web:22bf04b3e0221470981a44"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUserUid = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserUid = user.uid;
                await loadSettings();
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('start-date').value = today;
                document.getElementById('end-date').value = today;
                window.generateSummaryReport(); 
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadSettings() {
            try {
                const docSnap = await getDoc(doc(db, "user_settings", currentUserUid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if(data.profile?.bizName) document.getElementById('rpt-biz-name').innerText = data.profile.bizName.toUpperCase();
                    const groupSelect = document.getElementById('group-filter');
                    (data.groups || []).forEach(g => {
                        const opt = document.createElement('option');
                        opt.value = g; opt.innerText = g;
                        groupSelect.appendChild(opt);
                    });
                }
            } catch (err) { console.error(err); }
        }

        window.generateSummaryReport = async () => {
            const list = document.getElementById('report-body');
            const sDate = document.getElementById('start-date').value;
            const eDate = document.getElementById('end-date').value;
            const selectedGroup = document.getElementById('group-filter').value;

            document.getElementById('date-range-display').innerText = `PERIOD: ${sDate} TO ${eDate}`;
            list.innerHTML = '<tr><td colspan="6" class="text-center p-10 font-bold text-blue-600 animate-pulse uppercase">Merging & Calculating Data...</td></tr>';

            try {
                const snap = await getDocs(collection(db, "sharif_collection"));
                let groupedSummary = {}; 
                let gInv = 0, gColl = 0;

                snap.forEach(s => {
                    const d = s.data();
                    if ((d.uid || d.userId) !== currentUserUid) return;

                    const rawName = d.name ? d.name.trim().toUpperCase() : "";
                    if (rawName === "PAID ENTRY" || d.type === "paid" || rawName === "") return;

                    let dbDate = d.date || "";
                    if(dbDate.includes('/')) {
                        let p = dbDate.split('/');
                        dbDate = `${p[2]}-${p[0].padStart(2, '0')}-${p[1].padStart(2, '0')}`;
                    }

                    if(dbDate >= sDate && dbDate <= eDate) {
                        const group = d.group || "GENERAL";
                        if(selectedGroup !== "All" && group !== selectedGroup) return;

                        const iAmt = Number(d.invoice) || Number(d.invoiceAmount) || 0; 
                        const cAmt = Number(d.amount) || 0;

                        if(!groupedSummary[group]) groupedSummary[group] = {};
                        if(!groupedSummary[group][rawName]) {
                            groupedSummary[group][rawName] = { name: rawName, i: 0, c: 0, ids: [] };
                        }

                        groupedSummary[group][rawName].i += iAmt;
                        groupedSummary[group][rawName].c += cAmt;
                        groupedSummary[group][rawName].ids.push(s.id);
                        gInv += iAmt; gColl += cAmt;
                    }
                });

                let html = '';
                let sl = 1;

                Object.keys(groupedSummary).sort().forEach(group => {
                    html += `<tr class="group-header-row"><td colspan="6">GROUP: ${group}</td></tr>`;
                    let groupInv = 0, groupColl = 0;
                    
                    Object.values(groupedSummary[group]).sort((a,b) => a.name.localeCompare(b.name)).forEach((item) => {
                        const due = item.i - item.c;
                        html += `
                            <tr>
                                <td class="text-center">${sl++}</td>
                                <td class="text-left font-black">${item.name}</td>
                                <td class="text-center">৳ ${item.i.toLocaleString()}</td>
                                <td class="text-center">৳ ${item.c.toLocaleString()}</td>
                                <td class="text-center ${due > 0 ? 'text-red-600' : ''}">৳ ${due.toLocaleString()}</td>
                                <td class="text-center no-print">
                                    <button onclick="deleteGroupedEntries('${item.ids.join(',')}', '${item.name}')" class="text-slate-300 hover:text-red-600">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </td>
                            </tr>`;
                        groupInv += item.i; groupColl += item.c;
                    });

                    html += `
                        <tr class="subtotal-row">
                            <td colspan="2" class="text-right">SUBTOTAL (${group}):</td>
                            <td class="text-center">৳ ${groupInv.toLocaleString()}</td>
                            <td class="text-center">৳ ${groupColl.toLocaleString()}</td>
                            <td class="text-center">৳ ${(groupInv - groupColl).toLocaleString()}</td>
                            <td class="no-print"></td>
                        </tr>`;
                });

                list.innerHTML = html || '<tr><td colspan="6" class="text-center p-10 font-bold text-red-500 uppercase">No Summary Found!</td></tr>';
                document.getElementById('grand-total-box').classList.toggle('hidden', !html);
                document.getElementById('grand-inv').innerText = "৳ " + gInv.toLocaleString();
                document.getElementById('grand-coll').innerText = "৳ " + gColl.toLocaleString();
                document.getElementById('grand-gap').innerText = "৳ " + (gInv - gColl).toLocaleString();

            } catch (err) { console.error(err); }
        };

        window.deleteGroupedEntries = async (idsString, name) => {
            if(confirm(`আপনি কি নিশ্চিত? এটি "${name}"-এর সকল এন্ট্রি ডিলিট করবে।`)) {
                const ids = idsString.split(',');
                for(let id of ids) { await deleteDoc(doc(db, "sharif_collection", id)); }
                window.generateSummaryReport();
            }
        };

        document.getElementById('download-pdf').onclick = function () {
            const element = document.getElementById('pdf-area');
            const options = {
                margin: [10, 5, 10, 5],
                filename: 'Summary_Report_Sharif_Pharma.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(options).from(element).save();
        };
    </script>
</body>
</html>
