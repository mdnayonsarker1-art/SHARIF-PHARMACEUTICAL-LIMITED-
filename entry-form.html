<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharif Pharma - Collection Entry</title>
    
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .main-card { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.2);
            width: 100%; max-width: 420px;
            overflow: hidden;
            position: relative;
        }

        /* --- Updated Navigation Style --- */
        .nav-btn {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 14px;
            border: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .nav-btn:active { transform: scale(0.9); }

        .status-pill {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.5s ease;
        }
        /* --------------------------- */

        .online-glow { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .offline-glow { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .online-dot { background: #22c55e; animation: pulse 2s infinite; }
        .offline-dot { background: #ef4444; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .input-group {
            background: white;
            border: 2px solid #f1f5f9;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-group:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        .save-btn-container {
            position: relative;
            width: 110px; height: 110px;
            margin: 20px auto;
        }

        .save-btn {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white; border-radius: 50%;
            font-weight: 800; font-size: 16px;
            border: 8px solid #f8fafc;
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4);
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; position: relative;
        }
        .save-btn:active { transform: scale(0.9) rotate(-10deg); }

        #pendingModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.7); 
            z-index: 100; align-items: center; justify-content: center; 
            backdrop-filter: blur(8px); 
        }
    </style>
</head>
<body>

    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-3xl font-bold shadow-2xl opacity-0 z-[200] transition-all duration-500 text-sm whitespace-nowrap">
        ✨ ACTION SUCCESSFUL
    </div>

    <div class="main-card p-6 animate__animated animate__fadeInUp">
        
        <div class="flex justify-between items-center mb-8">
            <button onclick="location.href='details.html'" class="nav-btn text-slate-500 hover:text-blue-600">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            
            <div id="net-status" class="status-pill online-glow">
                <span class="dot online-dot"></span>
                <span id="status-text">ONLINE</span>
            </div>

            <button onclick="location.href='index.html'" class="nav-btn text-blue-600">
                <i class="fa-solid fa-house"></i>
            </button>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-xs font-extrabold text-slate-400 uppercase tracking-[4px] mb-2">Sharif Pharma</h1>
            <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Collection Entry</h2>
            <div class="mt-4 inline-block bg-slate-900 text-white px-10 py-3 rounded-2xl shadow-xl transform -rotate-1">
                <span id="display-group" class="text-xl font-black italic tracking-widest">...</span>
            </div>
        </div>

        <div class="space-y-4">
            <div class="input-group p-1 px-4">
                <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider">Date</label>
                <input type="date" id="entry-date" class="w-full pb-2 bg-transparent text-slate-700 font-bold outline-none">
            </div>

            <div class="input-group p-1 px-4">
                <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider">Pharmacy Name</label>
                <input type="text" list="customer-list" id="cust-name" class="w-full pb-2 bg-transparent text-slate-700 font-bold outline-none uppercase placeholder:text-slate-300" placeholder="SEARCH PHARMACY...">
                <datalist id="customer-list"></datalist>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="input-group p-1 px-4 border-blue-100">
                    <label class="text-[10px] font-extrabold text-blue-400 uppercase tracking-wider">Amount</label>
                    <input type="number" id="pay-received" class="w-full pb-2 bg-transparent text-blue-600 font-black text-xl outline-none placeholder:text-blue-200" placeholder="0.00">
                </div>
                <div class="input-group p-1 px-4">
                    <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider">Inv / Note</label>
                    <input type="text" id="inv-value" class="w-full pb-2 bg-transparent text-slate-600 font-bold outline-none placeholder:text-slate-300" placeholder="NO.">
                </div>
            </div>
        </div>

        <div class="mt-6 flex flex-col items-center">
            <div class="save-btn-container">
                <button id="saveBtn" class="save-btn">SAVE</button>
            </div>
            
            <button id="viewPendingBtn" class="group flex items-center gap-2 text-[10px] font-black text-slate-400 hover:text-blue-600 transition-all uppercase tracking-widest">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Pending Records 
                <span id="pendingCountBadge" class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full hidden">0</span>
            </button>
        </div>
    </div>

    <div id="pendingModal">
        <div class="bg-white w-[90%] max-w-[400px] rounded-[40px] p-8 animate__animated animate__zoomIn">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-extrabold text-xl text-slate-800">Pending <span class="text-blue-600">Data</span></h3>
                <button id="closeModal" class="text-slate-300 hover:text-red-500 transition-all"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
            </div>
            
            <div class="flex items-center gap-3 mb-4 bg-slate-50 p-4 rounded-2xl">
                <input type="checkbox" id="selectAll" class="w-5 h-5 accent-blue-600 cursor-pointer">
                <label for="selectAll" class="text-xs font-extrabold text-slate-600">SELECT ALL ITEMS</label>
            </div>

            <div id="pendingListContainer" class="space-y-3 max-h-[300px] overflow-y-auto mb-6 pr-2"></div>

            <button id="postSelectedBtn" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-extrabold shadow-2xl hover:bg-blue-600 transition-all uppercase tracking-widest text-xs">
                Post Selected Data
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQyZ3CcmzNxVbq2xwj-P89xohIVODrh1Y",
            authDomain: "nayon366-f79c6.firebaseapp.com",
            projectId: "nayon366-f79c6",
            storageBucket: "nayon366-f79c6.firebasestorage.app",
            messagingSenderId: "462628331277",
            appId: "1:462628331277:web:22bf04b3e0221470981a44"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserUid = "";
        const params = new URLSearchParams(window.location.search);
        const selectedGroup = params.get('group') || "GB-12";
        document.getElementById('display-group').innerText = selectedGroup;

        const getPending = () => JSON.parse(localStorage.getItem('sharif_pending')) || [];
        const savePending = (data) => localStorage.setItem('sharif_pending', JSON.stringify(data));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserUid = user.uid;
                loadCustomersOffline();
                syncCustomers(user.uid);
                updatePendingUI();
            } else {
                window.location.href = 'index.html'; 
            }
        });

        function syncCustomers(uid) {
            onSnapshot(doc(db, "user_settings", uid), (snap) => {
                if (!snap.exists()) return;
                const customers = snap.data().customers || [];
                localStorage.setItem(`cached_customers_${uid}`, JSON.stringify(customers));
                renderCustomerDatalist(customers);
            });
        }

        function loadCustomersOffline() {
            const saved = localStorage.getItem(`cached_customers_${currentUserUid}`);
            if (saved) { renderCustomerDatalist(JSON.parse(saved)); }
        }

        function renderCustomerDatalist(customers) {
            const custDatalist = document.getElementById('customer-list');
            const filtered = customers.filter(c => c.group === selectedGroup);
            custDatalist.innerHTML = filtered
                .sort((a, b) => a.name.localeCompare(b.name))
                .map(c => `<option value="${c.name}">`).join('');
        }

        function updatePendingUI() {
            const data = getPending();
            const badge = document.getElementById('pendingCountBadge');
            badge.innerText = data.length;
            data.length > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            t.classList.add('animate__animated', 'animate__fadeInDown');
            setTimeout(() => {
                t.style.opacity = '0';
                t.classList.remove('animate__fadeInDown');
            }, 3000);
        }

        document.getElementById('saveBtn').onclick = async () => {
            const name = document.getElementById('cust-name').value.trim();
            const amountInput = document.getElementById('pay-received').value;
            const invValue = document.getElementById('inv-value').value.trim();
            const rawDate = document.getElementById('entry-date').value;

            if(!name || !rawDate) return alert("❌ Pharmacy Name এবং Date দিন!");
            if(!amountInput && !invValue) return alert("❌ Amount অথবা Invoice নম্বর দিন!");

            const amount = amountInput ? parseFloat(amountInput) : 0;
            const [y, m, d] = rawDate.split('-');
            const formattedDate = `${parseInt(m)}/${parseInt(d)}/${y}`;

            const dataObj = {
                group: selectedGroup,
                type: 'collection', 
                name: name.toUpperCase(),
                amount: amount,
                invoice: invValue || "N/A",
                date: formattedDate,
                uid: currentUserUid,
                tempId: Date.now()
            };

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;

            try {
                if(navigator.onLine) {
                    await addDoc(collection(db, "sharif_collection"), { ...dataObj, timestamp: serverTimestamp() });
                    showToast("🚀 SAVED ONLINE");
                } else {
                    const pending = getPending();
                    pending.push(dataObj);
                    savePending(pending);
                    showToast("💾 SAVED OFFLINE");
                    updatePendingUI();
                }
                document.getElementById('cust-name').value = "";
                document.getElementById('pay-received').value = "";
                document.getElementById('inv-value').value = "";
                document.getElementById('cust-name').focus();
            } catch(e) { alert("Error: " + e.message); }
            btn.disabled = false;
            btn.innerHTML = "SAVE";
        };

        const modal = document.getElementById('pendingModal');
        const listContainer = document.getElementById('pendingListContainer');

        function renderPendingList() {
            const data = getPending();
            if(data.length === 0) {
                modal.style.display = 'none';
                return;
            }
            listContainer.innerHTML = data.map(item => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" class="item-cb w-4 h-4 accent-blue-600" value="${item.tempId}">
                        <div>
                            <p class="text-[11px] font-extrabold text-slate-800 uppercase">${item.name}</p>
                            <p class="text-[10px] font-bold text-blue-600">৳${item.amount} • ${item.date}</p>
                        </div>
                    </div>
                    <button onclick="window.deletePendingItem(${item.tempId})" class="text-red-400 p-2 hover:bg-red-50 rounded-full transition-all">
                        <i class="fa-solid fa-trash-can text-sm"></i>
                    </button>
                </div>
            `).join('');
        }

        window.deletePendingItem = (id) => {
            if(confirm("Delete this record?")) {
                const data = getPending();
                const filtered = data.filter(item => item.tempId !== id);
                savePending(filtered);
                updatePendingUI();
                renderPendingList();
            }
        };

        document.getElementById('viewPendingBtn').onclick = () => {
            if(getPending().length === 0) return showToast("NO PENDING DATA");
            renderPendingList();
            modal.style.display = 'flex';
        };

        document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
        
        document.getElementById('postSelectedBtn').onclick = async () => {
            if(!navigator.onLine) return alert("❌ কানেকশন নেই!");
            const checkedBoxes = document.querySelectorAll('.item-cb:checked');
            if(checkedBoxes.length === 0) return alert("সিলেক্ট করুন!");

            const selectedIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
            const allPending = getPending();
            const postBtn = document.getElementById('postSelectedBtn');
            
            postBtn.disabled = true;
            postBtn.innerHTML = "UPLOADING...";

            for(const id of selectedIds) {
                const item = allPending.find(p => p.tempId === id);
                if(item) {
                    try {
                        const { tempId, ...firebaseData } = item;
                        await addDoc(collection(db, "sharif_collection"), { ...firebaseData, timestamp: serverTimestamp() });
                    } catch(err) { console.error(err); }
                }
            }

            const remaining = allPending.filter(p => !selectedIds.includes(p.tempId));
            savePending(remaining);
            modal.style.display = 'none';
            updatePendingUI();
            showToast("✅ ALL DATA POSTED");
            postBtn.disabled = false;
            postBtn.innerHTML = "Post Selected Data";
        };

        function updateNetStatus() {
            const statusBox = document.getElementById('net-status');
            const statusText = document.getElementById('status-text');
            const dot = statusBox.querySelector('.dot');

            if(navigator.onLine) {
                statusBox.className = "status-pill online-glow";
                statusText.innerText = "ONLINE";
                dot.className = "dot online-dot";
            } else {
                statusBox.className = "status-pill offline-glow";
                statusText.innerText = "OFFLINE";
                dot.className = "dot offline-dot";
            }
        }
        window.addEventListener('online', updateNetStatus);
        window.addEventListener('offline', updateNetStatus);

        window.onload = () => {
            document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];
            updateNetStatus();
        };
    </script>
</body>
</html>
