<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharif Pharma - Collection History</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        
        /* Table Styles for PDF Accuracy */
        .report-table { border-collapse: collapse; width: 100%; border: 1.5px solid #000 !important; }
        .report-table th, .report-table td { border: 1px solid #000 !important; padding: 10px; text-transform: uppercase; }
        
        #print-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px; display: none; border: 2px solid #000; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-2 md:p-6 min-h-screen">

    <div id="pdf-area" class="max-w-4xl mx-auto bg-white p-6 md:p-10 rounded-[40px] shadow-2xl border border-gray-100">
        
        <div class="flex justify-between items-center mb-8 no-print">
            <a href="index.html" class="bg-slate-100 hover:bg-slate-200 px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all">← Home</a>
            <h2 class="font-black text-blue-900 italic uppercase text-lg md:text-2xl underline decoration-4 underline-offset-8">Collection History</h2>
            <button id="download-btn" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">
                <i class="fa-solid fa-file-pdf mr-1"></i> Save PDF
            </button>
        </div>

        <div class="bg-slate-50 p-6 rounded-[30px] grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 no-print border border-slate-100">
            <div class="flex flex-col">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1">From Date</label>
                <input type="date" id="f-date-start" class="p-3 border border-slate-200 rounded-xl bg-white shadow-sm font-bold text-slate-600 outline-none">
            </div>
            <div class="flex flex-col">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1">To Date (Optional)</label>
                <input type="date" id="f-date-end" class="p-3 border border-slate-200 rounded-xl bg-white shadow-sm font-bold text-slate-600 outline-none">
            </div>
            <div class="flex flex-col">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1">Group</label>
                <select id="f-group" class="p-3 border border-slate-200 rounded-xl bg-white shadow-sm font-bold text-slate-600 outline-none">
                    <option value="All">All Groups</option>
                </select>
            </div>
            <div class="flex items-end">
                <button onclick="window.loadData()" class="w-full bg-blue-700 hover:bg-blue-800 text-white p-3 rounded-xl font-black uppercase text-xs shadow-xl transition-all">
                    Search Now
                </button>
            </div>
        </div>

        <div id="pdf-header" class="hidden text-center mb-6">
            <img id="print-logo" src="" alt="Logo">
            <h1 id="rpt-biz-name" class="text-2xl font-black uppercase text-slate-900">SHARIF PHARMA</h1>
            <p class="font-bold text-slate-600 uppercase text-xs tracking-widest mt-1">Customer Collection Report</p>
            <p id="user-info" class="text-[8px] text-slate-400 mt-2 uppercase"></p>
        </div>

        <div class="overflow-x-auto rounded-xl mb-8">
            <table class="report-table w-full text-left">
                <thead class="bg-slate-100 text-black text-[10px] font-black uppercase">
                    <tr>
                        <th class="p-4 border-r border-black">Date</th>
                        <th class="p-4 border-r border-black">Group</th>
                        <th class="p-4 border-r border-black">Customer Name</th>
                        <th class="p-4 text-right border-r border-black">Amount</th>
                        <th class="p-4 text-center no-print">Del</th>
                    </tr>
                </thead>
                <tbody id="data-list" class="text-xs font-bold bg-white text-slate-700">
                    <tr><td colspan="5" class="p-10 text-center italic border border-black text-slate-400">Loading Records...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="stats-panel" class="bg-slate-900 text-white p-8 rounded-[35px] flex justify-between items-center shadow-2xl">
            <div>
                <p class="text-[9px] font-black opacity-40 uppercase tracking-[4px]">GRAND TOTAL</p>
                <h1 id="total-val" class="text-4xl font-black italic">৳ 0</h1>
            </div>
            <div class="text-right">
                <p class="text-[9px] font-black opacity-40 uppercase tracking-[4px]">TOTAL ENTRIES</p>
                <h3 id="total-count" class="text-2xl font-black">0</h3>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQyZ3CcmzNxVbq2xwj-P89xohIVODrh1Y",
            authDomain: "nayon366-f79c6.firebaseapp.com",
            projectId: "nayon366-f79c6",
            storageBucket: "nayon366-f79c6.firebasestorage.app",
            messagingSenderId: "462628331277",
            appId: "1:462628331277:web:22bf04b3e0221470981a44"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUserUid = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserUid = user.uid;
                document.getElementById('user-info').innerText = "Generated for: " + user.email;
                await fetchGroupsFromSettings();
                document.getElementById('f-date-start').value = new Date().toISOString().split('T')[0];
                window.loadData();
            } else {
                window.location.href = 'index.html';
            }
        });

        async function fetchGroupsFromSettings() {
            try {
                const docSnap = await getDoc(doc(db, "user_settings", currentUserUid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if(data.profile?.bizName) document.getElementById('rpt-biz-name').innerText = data.profile.bizName.toUpperCase();
                    if(data.profile?.photo) {
                        const logo = document.getElementById('print-logo');
                        logo.src = data.profile.photo;
                        logo.style.display = 'block';
                    }
                    const groupsArray = data.groups || [];
                    const groupSelect = document.getElementById('f-group');
                    groupSelect.innerHTML = '<option value="All">All Groups</option>';
                    groupsArray.forEach(g => {
                        groupSelect.innerHTML += `<option value="${g}">${g}</option>`;
                    });
                }
            } catch (err) { console.error(err); }
        }

        window.loadData = async () => {
            const list = document.getElementById('data-list');
            list.innerHTML = '<tr><td colspan="5" class="p-10 text-center italic border border-black">Searching...</td></tr>';
            
            try {
                const snap = await getDocs(collection(db, "sharif_collection"));
                let html = '', grandTotal = 0, count = 0;
                const searchStart = document.getElementById('f-date-start').value; 
                const searchEnd = document.getElementById('f-date-end').value;     
                const selGrp = document.getElementById('f-group').value;

                let groupData = {};

                snap.forEach(s => {
                    const d = s.data();
                    if ((d.uid || d.userId) !== currentUserUid) return;
                    if (d.type !== "collection") return;
                    
                    // ✅ ০ টাকার এন্ট্রি ফিল্টার আউট করা হয়েছে
                    if (Number(d.amount) <= 0) return;

                    let dbDateRaw = d.date || "";
                    let normalizedDate = "";
                    if(dbDateRaw.includes('/')) {
                        let parts = dbDateRaw.split('/');
                        normalizedDate = `${parts[2]}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
                    } else { normalizedDate = dbDateRaw; }

                    let dateMatch = (searchEnd) ? (normalizedDate >= searchStart && normalizedDate <= searchEnd) : (normalizedDate === searchStart);
                    let groupMatch = (selGrp === "All" || d.group === selGrp);

                    if(dateMatch && groupMatch) {
                        if (!groupData[d.group]) groupData[d.group] = { items: [], total: 0 };
                        groupData[d.group].items.push({id: s.id, ...d, displayDate: dbDateRaw});
                        groupData[d.group].total += Number(d.amount);
                        grandTotal += Number(d.amount);
                        count++;
                    }
                });

                const sortedGroups = Object.keys(groupData).sort();
                sortedGroups.forEach(group => {
                    groupData[group].items.forEach(item => {
                        html += `
                        <tr class="border-b border-black">
                            <td class="p-4 border-r border-black">${item.displayDate}</td>
                            <td class="p-4 border-r border-black uppercase text-blue-800 font-black">${item.group}</td>
                            <td class="p-4 border-r border-black uppercase">${item.name}</td>
                            <td class="p-4 text-right border-r border-black font-black">৳ ${Number(item.amount).toLocaleString()}</td>
                            <td class="p-4 text-center no-print">
                                <button onclick="window.delItem('${item.id}')" class="text-slate-300 hover:text-red-600">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </td>
                        </tr>`;
                    });
                    html += `<tr class="bg-slate-50 border-t border-black">
                        <td colspan="3" class="p-3 text-right uppercase text-[9px] font-black border-r border-black">Sub-total ${group}:</td>
                        <td class="p-3 text-right font-black border-r border-black font-black">৳ ${groupData[group].total.toLocaleString()}</td>
                        <td class="no-print border-black"></td>
                    </tr>`;
                });

                list.innerHTML = html || '<tr><td colspan="5" class="p-10 text-center border border-black font-bold text-red-500 uppercase">No Records!</td></tr>';
                document.getElementById('total-val').innerText = "৳ " + grandTotal.toLocaleString();
                document.getElementById('total-count').innerText = count;

            } catch (err) { console.error(err); }
        };

        window.delItem = async (id) => {
            if(confirm("Delete this entry?")) {
                try {
                    await deleteDoc(doc(db, "sharif_collection", id));
                    window.loadData();
                } catch (err) { alert("Delete failed!"); }
            }
        };

        document.getElementById('download-btn').onclick = function() {
            const element = document.getElementById('pdf-area');
            const header = document.getElementById('pdf-header');
            
            const noPrint = document.querySelectorAll('.no-print');
            noPrint.forEach(el => el.style.display = 'none');
            header.classList.remove('hidden');

            const opt = {
                margin:       [10, 5, 10, 5], 
                filename:      'Sharif_Pharma_Collection.pdf',
                image:        { type: 'jpeg', quality: 1 }, 
                html2canvas:  { 
                    scale: 4, 
                    useCORS: true, 
                    letterRendering: true
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                noPrint.forEach(el => el.style.display = '');
                header.classList.add('hidden');
            });
        };
    </script>
</body>
</html>
