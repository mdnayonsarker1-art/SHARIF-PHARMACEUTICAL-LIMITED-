<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharif Pharma - Payment History</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        
        /* Table Styles for Crystal Clear PDF */
        .report-table { border-collapse: collapse; width: 100%; border: 1.5px solid #000 !important; }
        .report-table th, .report-table td { border: 1px solid #000 !important; padding: 12px; text-transform: uppercase; color: #000; }
        .report-table th { background: #f2f2f2 !important; font-weight: 900; }
        
        #print-logo { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px; display: none; border: 2px solid #000; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-2 md:p-6 min-h-screen">

    <div id="pdf-area" class="max-w-4xl mx-auto bg-white p-6 md:p-10 rounded-[40px] shadow-2xl border border-gray-100">
        
        <div class="flex justify-between items-center mb-8 no-print">
            <a href="index.html" class="bg-slate-100 hover:bg-slate-200 px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all">← Home</a>
            <h2 class="font-black text-red-700 italic uppercase text-lg md:text-2xl underline decoration-4 underline-offset-8">Payment History</h2>
            <button id="download-btn" class="bg-black hover:bg-slate-800 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">
                <i class="fa-solid fa-file-pdf mr-1 text-red-500"></i> Save PDF
            </button>
        </div>

        <div class="bg-slate-50 p-6 rounded-[30px] grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 no-print border border-slate-100">
            <div class="flex flex-col">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1">From Date</label>
                <input type="date" id="f-date-start" class="p-3 border border-slate-200 rounded-xl bg-white shadow-sm font-bold text-slate-600 outline-none">
            </div>
            <div class="flex flex-col">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1">To Date (Optional)</label>
                <input type="date" id="f-date-end" class="p-3 border border-slate-200 rounded-xl bg-white shadow-sm font-bold text-slate-600 outline-none">
            </div>
            <div class="flex flex-col">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1">Group Filter</label>
                <select id="f-group" class="p-3 border border-slate-200 rounded-xl bg-white shadow-sm font-bold text-slate-600 outline-none cursor-pointer">
                    <option value="All">All Groups</option>
                </select>
            </div>
            <div class="flex items-end">
                <button onclick="window.loadData()" class="w-full bg-red-600 hover:bg-red-700 text-white p-3 rounded-xl font-black uppercase text-xs shadow-xl transition-all">
                    Search Now
                </button>
            </div>
        </div>

        <div id="pdf-header" class="hidden text-center mb-8">
            <img id="print-logo" src="" alt="Logo">
            <h1 id="rpt-biz-name" class="text-2xl font-black uppercase text-slate-900">Sharif Pharmaceuticals Ltd.</h1>
            <p class="font-bold text-slate-600 uppercase text-xs tracking-[4px] mt-1 border-b-2 border-black inline-block pb-1">Payment History Report</p>
            <p id="user-info" class="text-[9px] text-slate-400 mt-3 uppercase font-bold"></p>
        </div>

        <div class="overflow-x-auto rounded-xl mb-8">
            <table class="report-table w-full text-left">
                <thead class="bg-slate-100 text-black text-[10px] font-black uppercase">
                    <tr>
                        <th class="p-4 border-r border-black">Date</th>
                        <th class="p-4 border-r border-black">Group</th>
                        <th class="p-4 border-r border-black">Customer Name</th>
                        <th class="p-4 text-right border-r border-black">Amount</th>
                        <th class="p-4 text-center no-print">Del</th>
                    </tr>
                </thead>
                <tbody id="data-list" class="text-xs font-bold bg-white text-slate-700">
                    <tr><td colspan="5" class="p-10 text-center italic border border-black text-slate-400 uppercase">Searching Database...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="stats-panel" class="bg-slate-900 text-white p-8 rounded-[35px] flex justify-between items-center shadow-2xl">
            <div>
                <p class="text-[9px] font-black opacity-40 uppercase tracking-[4px]">GRAND TOTAL PAID</p>
                <h1 id="total-val" class="text-4xl font-black italic">৳ 0</h1>
            </div>
            <div class="text-right">
                <p class="text-[9px] font-black opacity-40 uppercase tracking-[4px]">TOTAL ENTRIES</p>
                <h3 id="total-count" class="text-2xl font-black">0</h3>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQyZ3CcmzNxVbq2xwj-P89xohIVODrh1Y",
            authDomain: "nayon366-f79c6.firebaseapp.com",
            projectId: "nayon366-f79c6",
            storageBucket: "nayon366-f79c6.firebasestorage.app",
            messagingSenderId: "462628331277",
            appId: "1:462628331277:web:22bf04b3e0221470981a44"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserUid = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserUid = user.uid;
                document.getElementById('user-info').innerText = "Report Owner: " + user.email;
                await loadSettings();
                document.getElementById('f-date-start').value = new Date().toISOString().split('T')[0];
                window.loadData();
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadSettings() {
            try {
                const docSnap = await getDoc(doc(db, "user_settings", currentUserUid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if(data.profile?.bizName) document.getElementById('rpt-biz-name').innerText = data.profile.bizName.toUpperCase();
                    if(data.profile?.photo) {
                        const logo = document.getElementById('print-logo');
                        logo.src = data.profile.photo;
                        logo.style.display = 'block';
                    }
                    const groups = data.groups || [];
                    const groupSelect = document.getElementById('f-group');
                    groups.forEach(g => {
                        const opt = document.createElement('option');
                        opt.value = g; opt.textContent = g;
                        groupSelect.appendChild(opt);
                    });
                }
            } catch (err) { console.error(err); }
        }

        window.loadData = async () => {
            const list = document.getElementById('data-list');
            list.innerHTML = '<tr><td colspan="5" class="p-10 text-center italic border border-black text-slate-400">Loading...</td></tr>';
            
            try {
                const snap = await getDocs(collection(db, "sharif_collection"));
                let html = '', grandTotal = 0, count = 0;
                const searchStart = document.getElementById('f-date-start').value; 
                const searchEnd = document.getElementById('f-date-end').value;     
                const selGrp = document.getElementById('f-group').value;

                let items = [];

                snap.forEach(s => {
                    const d = s.data();
                    if ((d.uid || d.userId) === currentUserUid && d.type === "paid") {
                        let dbDateRaw = d.date || "";
                        let normalizedDate = "";
                        if(dbDateRaw.includes('/')) {
                            let parts = dbDateRaw.split('/');
                            normalizedDate = `${parts[2]}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
                        } else { normalizedDate = dbDateRaw; }

                        let dateMatch = (searchEnd) ? (normalizedDate >= searchStart && normalizedDate <= searchEnd) : (normalizedDate === searchStart);
                        let groupMatch = (selGrp === "All" || d.group === selGrp);

                        if(dateMatch && groupMatch) {
                            items.push({id: s.id, ...d, sortDate: normalizedDate});
                        }
                    }
                });

                items.sort((a, b) => b.sortDate.localeCompare(a.sortDate));

                items.forEach(item => {
                    grandTotal += Number(item.amount);
                    count++;
                    html += `
                    <tr class="border-b border-black">
                        <td class="p-4 border-r border-black">${item.date}</td>
                        <td class="p-4 border-r border-black uppercase text-red-600 font-black">${item.group}</td>
                        <td class="p-4 border-r border-black uppercase">${item.name}</td>
                        <td class="p-4 text-right border-r border-black font-black">৳ ${Number(item.amount).toLocaleString()}</td>
                        <td class="p-4 text-center no-print">
                            <button onclick="window.delItem('${item.id}')" class="text-slate-300 hover:text-red-600">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>`;
                });

                list.innerHTML = html || '<tr><td colspan="5" class="p-10 text-center border border-black font-bold text-red-500 uppercase">Empty Database!</td></tr>';
                document.getElementById('total-val').innerText = "৳ " + grandTotal.toLocaleString();
                document.getElementById('total-count').innerText = count;

            } catch (err) { console.error(err); }
        };

        window.delItem = async (id) => {
            if(confirm("Confirm Delete?")) {
                try {
                    await deleteDoc(doc(db, "sharif_collection", id));
                    window.loadData();
                } catch (err) { alert("Error!"); }
            }
        };

        // ✅ হাই-কোয়ালিটি (Scale 4) PDF ডাউনলোড লজিক
        document.getElementById('download-btn').onclick = function() {
            const element = document.getElementById('pdf-area');
            const header = document.getElementById('pdf-header');
            const noPrint = document.querySelectorAll('.no-print');
            
            // বাটন এবং ফিল্টার হাইড করা
            noPrint.forEach(el => el.style.display = 'none');
            header.classList.remove('hidden'); 

            const opt = {
                margin:       [10, 5, 10, 5],
                filename:     'Sharif_Pharma_Payment_History.pdf',
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { 
                    scale: 4,      // এটি ৪ গুণ রেজোলিউশন বাড়াবে
                    useCORS: true, 
                    letterRendering: true 
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                // ডাউনলোড শেষে সব ফিরে আসবে
                noPrint.forEach(el => el.style.display = '');
                header.classList.add('hidden'); 
            });
        };
    </script>
</body>
</html>
